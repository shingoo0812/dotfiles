services:
  nvim:
    build:
      context: ..
      dockerfile: Dockerfile/Dockerfile
    image: dotfiles-nvim
    container_name: dotfiles-nvim
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    volumes:
      - /mnt:/mnt                 # All Windows drives (C, F, etc.) dynamically
      - ~/workspace:/workspace    # Host workspace (read-write)
