services:
  nvim:
    build: .
    image: dotfiles-nvim
    container_name: dotfiles-nvim
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    volumes:
      - /mnt/c:/mnt/c:ro          # Windows C drive (read-only)
      - /mnt/f:/mnt/f:ro          # Windows F drive for Obsidian vault (read-only)
      - ~/workspace:/workspace    # Host workspace (read-write)
