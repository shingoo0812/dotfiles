services:
  nvim:
    build:
      context: ..
      dockerfile: Dockerfile/Dockerfile
    image: dotfiles-nvim
    container_name: dotfiles-nvim
    stdin_open: true
    tty: true
    command: bash -c "mkdir -p /root/.ssh /root/.local/share/jupyter/runtime && cp /wsl/home/.ssh/id_ed25519.pub /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG8iejXFsptgmoKDkiVSjKZES1cY3DOuBehbvIbueYBx" >> /root/.ssh/authorized_keys; service ssh start; tail -f /dev/null"
    ports:
      - "2222:22"
    environment:
      - TERM=wezterm
      - JUPYTER_RUNTIME_DIR=/tmp/jupyter/runtime
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /mnt:/mnt                 # All Windows drives (C, F, etc.) dynamically
      - ~/workspace:/workspace
      - /home/shingo:/wsl/home
      - nvim_data:/root/.local/share/nvim    # Host workspace (read-write)

volumes:
  nvim_data:
